<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Merry Christmas, Patty!</title>
    <script src="js/lib/phaser.min.js" type="text/javascript"></script>
    <script src="js/blocklist.js" type="text/javascript"></script>
    <script src="js/blockstate.js" type="text/javascript"></script>
    <script src="js/config.js" type="text/javascript"></script>
    <script src="js/depths.js" type="text/javascript"></script>
    <script src="js/director.js" type="text/javascript"></script>
    <script src="js/directorstate.js" type="text/javascript"></script>
    <script src="js/gift.js" type="text/javascript"></script>
    <script src="js/grid.js" type="text/javascript"></script>
    <script src="js/gridrunner.js" type="text/javascript"></script>
    <script src="js/grinch.js" type="text/javascript"></script>
    <script src="js/instructions.js" type="text/javascript"></script>
    <script src="js/joystick.js" type="text/javascript"></script>
    <script src="js/main.js" type="text/javascript"></script>
    <script src="js/pathery.js" type="text/javascript"></script>
    <script src="js/patty.js" type="text/javascript"></script>
    <script src="js/santa.js" type="text/javascript"></script>
    <script src="js/victorycutscene.js" type="text/javascript"></script>
    <script src="js/world.js" type="text/javascript"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #game-container {
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        position: relative;
      }

      #game canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        width: auto !important;
        height: auto !important;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ── Joystick ───────────────────────────────────────── */
      #joystick-container {
        position: fixed;
        bottom: 20px; left: 20px;
        width: 120px; height: 120px;
        background: rgba(255,255,255,0.10);
        border: 2px solid rgba(255,255,255,0.30);
        border-radius: 50%;
        z-index: 1000;
        display: none;
        touch-action: none;
      }
      #joystick-thumb {
        position: absolute;
        width: 48px; height: 48px;
        background: radial-gradient(circle at 35% 35%,
            rgba(255,160,160,0.90), rgba(200,60,60,0.75));
        border: 2px solid rgba(255,255,255,0.50);
        border-radius: 50%;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }

      /* ── Action buttons ─────────────────────────────────── */
      #mobile-buttons {
        position: fixed;
        bottom: 20px; right: 20px;
        display: none;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        z-index: 1000;
      }
      .mobile-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        border: 2px solid rgba(255,255,255,0.40);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-user-select: none; user-select: none;
        box-shadow: 0 3px 10px rgba(0,0,0,0.45);
        transition: filter 0.08s, transform 0.08s;
        padding: 0 16px;
        height: 52px;
        min-width: 88px;
        white-space: nowrap;
      }
      .mobile-btn:active { filter: brightness(1.35); transform: scale(0.94); }
      #btn-produce      { background: rgba(70,120,255,0.85); }
      #btn-speed        { background: rgba(235,175,0,0.85); color: #1a1000; }
      #btn-instructions { background: rgba(50,205,110,0.85); color: #001a09; }

      /* ── Pickup button ──────────────────────────────────── */
      #pickup-btn {
        display: none;
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: #d4af37;
        color: #1a0a00;
        border: none;
        border-radius: 24px;
        padding: 14px 36px;
        font-size: 18px;
        font-family: Georgia, serif;
        font-weight: bold;
        cursor: pointer;
        z-index: 1001;
        touch-action: manipulation;
        animation: pickupPulse 1s ease-in-out infinite alternate;
      }
      @keyframes pickupPulse {
        from { box-shadow: 0 0 8px rgba(212,175,55,0.4); }
        to   { box-shadow: 0 0 28px rgba(212,175,55,1.0); }
      }

      /* ── Morning overlay ────────────────────────────────── */
      #morning-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
        z-index: 2000;
        overflow: hidden;
      }

      /* Flower particles */
      .flower {
        position: absolute;
        bottom: -60px;
        font-size: 28px;
        animation: flowerRise linear forwards;
        pointer-events: none;
        z-index: 1999;
      }
      @keyframes flowerRise {
        0%   { transform: translateY(0) rotate(0deg) scale(0.7);  opacity: 0; }
        10%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
      }

      /* Popup card */
      #morning-inner {
        position: relative;
        z-index: 2001;
        background: #fff;
        border-radius: 24px;
        padding: 36px 40px 32px;
        text-align: center;
        max-width: 340px;
        width: 88%;
        box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.7) translateY(30px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }

      .morning-emoji {
        font-size: 52px;
        display: block;
        margin-bottom: 12px;
        animation: emojiBounce 0.6s ease 0.3s both;
      }
      @keyframes emojiBounce {
        0%   { transform: scale(0); }
        60%  { transform: scale(1.2); }
        100% { transform: scale(1); }
      }

      #morning-inner h2 {
        color: #2d2d2d;
        font-family: Georgia, serif;
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      #morning-text {
        color: #555;
        font-family: Georgia, serif;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      #morning-close {
        background: #e84393;
        color: #fff;
        border: none;
        border-radius: 50px;
        padding: 12px 36px;
        font-size: 15px;
        font-family: Georgia, serif;
        font-weight: bold;
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 0.1s, filter 0.1s;
        box-shadow: 0 4px 14px rgba(232,67,147,0.4);
      }
      #morning-close:active {
        transform: scale(0.95);
        filter: brightness(1.1);
      }

      /* ── Responsive ─────────────────────────────────────── */
      @media (max-width: 1024px) {
        #joystick-container { display: block; }
        #mobile-buttons     { display: flex; }
      }
      @media (min-width: 481px) and (max-width: 1024px) {
        #joystick-container { width:140px; height:140px; bottom:28px; left:28px; }
        #joystick-thumb     { width:56px; height:56px; }
        #mobile-buttons     { bottom:28px; right:28px; gap:12px; }
        .mobile-btn         { height:60px; font-size:15px; min-width:96px; }
        #pickup-btn         { bottom:110px; font-size:20px; padding:16px 40px; }
      }
      @media (max-width: 480px) {
        #joystick-container { width:100px; height:100px; bottom:14px; left:14px; }
        #joystick-thumb     { width:40px; height:40px; }
        #mobile-buttons     { bottom:14px; right:14px; gap:8px; }
        .mobile-btn         { height:44px; font-size:11px; min-width:72px; padding:0 10px; }
        #pickup-btn         { bottom:80px; font-size:15px; padding:12px 28px; }
        #morning-inner      { padding: 28px 22px 24px; }
        #morning-inner h2   { font-size: 19px; }
        .morning-emoji      { font-size: 42px; }
      }
      @media (orientation: landscape) and (max-height: 500px) {
        #joystick-container { width:88px; height:88px; bottom:10px; left:10px; }
        #joystick-thumb     { width:34px; height:34px; }
        #mobile-buttons     { bottom:10px; right:10px; gap:6px; flex-direction:row; align-items:flex-end; }
        .mobile-btn         { height:40px; font-size:10px; min-width:60px; padding:0 8px; }
        #pickup-btn         { bottom:60px; font-size:14px; padding:10px 24px; }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game"></div>

      <div id="joystick-container">
        <div id="joystick-thumb"></div>
      </div>

      <div id="mobile-buttons">
        <button id="btn-produce" class="mobile-btn">▶ Produce</button>
        <!-- <button id="btn-speed" class="mobile-btn">⚡ Speed</button> -->
        <button id="btn-instructions" class="mobile-btn">ℹ Info</button>
      </div>
    </div>

    <button id="pickup-btn">PENCETTT</button>

    <div id="morning-overlay">
      <div id="morning-inner">
        <span class="morning-emoji">🌸</span>
        <h2>SELAMATTTT HARII SABTUUU</h2>
        <p id="morning-text"></p>
        <button id="morning-close">WKWKWKWKWK</button>
      </div>
    </div>

    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var canvas = document.querySelector('#game canvas');
          if (canvas) canvas.style.touchAction = 'none';
        }, 500);
      });

      // Flower emojis to rain upward
      var flowerEmojis = ['🌸','🌺','🌼','🌻','💐','🌷','🌹','🏵️'];

      function launchFlowers() {
        var overlay = document.getElementById('morning-overlay');
        var count = 0;
        var interval = setInterval(function() {
          if (count >= 28) { clearInterval(interval); return; }
          var el = document.createElement('span');
          el.className = 'flower';
          el.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
          // random horizontal position
          el.style.left = (Math.random() * 100) + '%';
          // random duration between 2.2s and 3.8s
          var dur = 2.2 + Math.random() * 1.6;
          el.style.animationDuration = dur + 's';
          // slight random delay so they don't all fire at once
          el.style.animationDelay = (Math.random() * 0.6) + 's';
          el.style.fontSize = (22 + Math.floor(Math.random() * 18)) + 'px';
          overlay.appendChild(el);
          // clean up after animation
          setTimeout(function() { el.remove(); }, (dur + 1) * 1000);
          count++;
        }, 80);
      }

      // Called from main.js after gift pickup to trigger flowers
      window.triggerMorningOverlay = function(message) {
        var overlay = document.getElementById('morning-overlay');
        var msgEl = document.getElementById('morning-text');
        msgEl.textContent = message;
        overlay.style.display = 'flex';
        launchFlowers();
      };

      document.getElementById('morning-close').addEventListener('click', function() {
        document.getElementById('morning-overlay').style.display = 'none';
      });
    </script>
  </body>
</html>
